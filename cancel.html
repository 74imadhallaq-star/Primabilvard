<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betalning avbruten - Prima Bilvård</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0A3D78;
      --accent: #1E5AA8;
      --bg-dark: #0B0B0B;
      --bg-secondary: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #C7CCD1;
      --border: #333333;
      --warning: #d07a2b;
    }
    * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 25% 15%, rgba(30, 90, 168, 0.16), transparent 35%),
        radial-gradient(circle at 78% 90%, rgba(208, 122, 43, 0.16), transparent 30%),
        linear-gradient(165deg, #090909, #121826);
      color: var(--text-primary);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--bg-secondary);
      border: 1px solid var(--border);
      border-top: 4px solid var(--warning);
      border-radius: 18px;
      padding: 34px 26px;
      text-align: center;
      box-shadow: 0 24px 56px rgba(0,0,0,.52);
      backdrop-filter: blur(3px);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(208, 122, 43, 0.5);
      background: rgba(208, 122, 43, 0.14);
      color: #ffe8cf;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 7px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .icon {
      font-size: 56px;
      margin: 8px 0 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: -0.4px;
      font-family: 'Playfair Display', serif;
    }

    p {
      margin: 8px 0;
      color: var(--text-secondary);
      line-height: 1.65;
      font-size: 1rem;
    }

    .summary {
      margin: 18px 0 0;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 14px;
      text-align: left;
      color: #dde4ee;
      font-size: 0.95rem;
    }

    .summary strong {
      color: #ffffff;
    }

    .actions { display: grid; gap: 10px; margin-top: 22px; }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-weight: 700;
      border: 2px solid transparent;
      transition: .2s ease;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-color: #9fb6d5;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(30, 90, 168, 0.24);
    }

    @media (max-width: 640px) {
      .card {
        padding: 26px 18px;
        border-radius: 14px;
      }

      h1 {
        font-size: 1.65rem;
      }

      p {
        font-size: 0.95rem;
      }

      .btn {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="status">⚠ Betalning avbruten</div>
    <div class="icon">⚠️</div>
    <h1>Betalningen avbröts</h1>
    <p>Ingen betalning drogs.</p>
    <p>Du kan försöka igen direkt när du vill.</p>

    <div class="summary">
      <strong>Tips:</strong><br>
      Kontrollera kortuppgifter och försök igen. Om problemet kvarstår kan du boka via telefon så hjälper vi dig direkt.
    </div>

    <div class="actions">
      <a class="btn" href="index.html#booking">Försök igen</a>
    </div>
  </main>
</body>
</html>
